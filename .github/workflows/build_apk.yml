name: Build Android APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          pwd
          ls -la
          find . -maxdepth 3

      - name: Check gradlew
        run: |
          if [ -f "./gradlew" ]; then
            echo "gradlew found"
          else
            echo "gradlew NOT found"
            exit 1
          fi
